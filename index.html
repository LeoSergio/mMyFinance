<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle Financeiro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Financeiro">
    <link rel="apple-touch-icon" href="src/assets/icon-192.png">
    <link rel="stylesheet" href="src/styles/main.css">
    <link rel="stylesheet" href="src/styles/media.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>

<!-- ===== MODAL DE NOME ===== -->
<div id="name-modal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-icon"><i class='bx bx-user-circle'></i></div>
    <h2>Olá! Como posso te chamar?</h2>
    <p>Seu nome será salvo para futuras visitas.</p>
    <input type="text" id="name-input" placeholder="Digite seu nome..." maxlength="30" autocomplete="off">
    <button id="name-submit"><i class='bx bx-check'></i> Confirmar</button>
  </div>
</div>

<!-- ===== HEADER ===== -->
<div class="header">
    <header>
        <div class="header-left">
            <button id="menu-toggle" class="hamburger-btn" title="Menu" aria-label="Abrir menu">
                <span></span><span></span><span></span>
            </button>
            <div id="welcome-banner" class="welcome-banner" style="display:none;">
                <i class='bx bx-wallet-alt'></i>
                <span id="welcome-text"></span>
            </div>
        </div>
        <div class="header-right">
            <span class="header-title"><i class='bx bx-line-chart'></i> Controle Financeiro</span>
            <button id="theme-toggle" class="theme-btn" title="Alternar tema">
                <i id="theme-icon" class="bx bx-moon"></i>
            </button>
        </div>
    </header>

    <nav id="nav-drawer" class="nav-drawer">
        <div class="nav-drawer-header">
            <span>Menu</span>
            <button id="menu-close" class="nav-close-btn"><i class='bx bx-x'></i></button>
        </div>
        <ul>
            <li><a href="https://leosergio.github.io/Projeto"><i class='bx bx-home-alt-2'></i>Home</a></li>
            <li><a href="https://leosergio.github.io/Projeto/curriculo/curriculo"><i class='bx bx-spreadsheet'></i>Currículo</a></li>
            <li><a href="https://leosergio.github.io/Projeto/portfolio/portfolio"><i class='bx bx-briefcase-alt'></i>Portfólio</a></li>
            <li><a href="https://leosergio.github.io/Projeto/sobremim/sobremim"><i class='bx bx-male'></i>Sobre</a></li>
        </ul>
    </nav>
    <div id="nav-overlay" class="nav-overlay"></div>
</div>

<section>
    <h1>Sistema Financeiro</h1>
</section>

<main>
    <!-- CARDS DE RESUMO -->
    <div class="resume">
        <div class="card card-income">
            <span><i class='bx bx-trending-up'></i> Entradas</span>
            <h2>R$ <span class="incomes">0.00</span></h2>
        </div>
        <div class="card card-expense">
            <span><i class='bx bx-trending-down'></i> Saídas</span>
            <h2>R$ <span class="expenses">0.00</span></h2>
        </div>
        <div class="card card-total">
            <span><i class='bx bx-wallet'></i> Saldo Atual</span>
            <h2>R$ <span class="total">0.00</span></h2>
        </div>
    </div>

    <!-- FORMULÁRIO -->
    <div class="newItem">
        <div class="input-group">
            <label for="desc"><i class='bx bx-edit-alt'></i> Descrição</label>
            <input type="text" id="desc" placeholder="Ex: Aluguel, Mercado, Salário">
        </div>
        <div class="input-group">
            <label for="amount"><i class='bx bx-money'></i> Valor (R$)</label>
            <input type="number" id="amount" placeholder="0.00" step="0.01" min="0.01">
        </div>
        <div class="input-group">
            <label for="date"><i class='bx bx-calendar'></i> Data</label>
            <input type="date" id="date">
        </div>
        <div class="input-group">
            <label for="type"><i class='bx bx-transfer'></i> Tipo</label>
            <select id="type">
                <option value="Entrada">Entrada</option>
                <option value="Fixo">Saída Fixa</option>
                <option value="Variavel">Saída Variável</option>
            </select>
        </div>
        <button id="btnNew"><i class='bx bx-plus-circle'></i> Incluir</button>
    </div>

    <!-- DATA SELECIONADA -->
    <div id="selected-date-wrap" class="selected-date-wrap" style="display:none;">
        <i class='bx bx-calendar-check'></i>
        <span id="selected-date-display"></span>
    </div>

    <!-- TABELA -->
    <div class="divTable">
        <table>
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Descrição</th>
                    <th class="columnAmount">Valor</th>
                    <th class="columnType">Tipo</th>
                    <th class="columnAction"></th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <!-- GRÁFICO DE EVOLUÇÃO -->
    <div class="chart-section">
        <h3 class="dash-title"><i class="bx bx-line-chart"></i> Evolução do Saldo</h3>
        <div id="balance-chart"></div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="dashboard-section"></div>
</main>

<!-- BOTÕES FLUTUANTES -->
<div class="fab-group">
    <button id="btnInstall" title="Instalar app" style="display:none;">
        <i class='bx bx-download'></i> Instalar App
    </button>
    <button id="btnPrint" onclick="btnPrint()" title="Imprimir">
        <i class='bx bx-printer'></i> Imprimir
    </button>
    <button id="btnExportCSV" onclick="btnExport()" title="Exportar para Google Sheets">
        <i class='bx bx-export'></i> Exportar CSV
    </button>
</div>

<footer></footer>

<script type="module" src="src/js/main.js"></script>
<script src="https://unpkg.com/boxicons@2.1.4/dist/boxicons.js"></script>
</body>
</html>
