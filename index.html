<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle Financeiro</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/media.css">

    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
<div class="header">
    <header>
        <ul>
            <li><a href="https://leosergio.github.io/Projeto"><i class='bx bx-home-alt-2'></i>Home</a></li>
            <li><a href="https://leosergio.github.io/Projeto/curriculo/curriculo"><i class='bx bx-spreadsheet'></i>Curriculo</a></li>
            <li><a href="https://leosergio.github.io/Projeto/portfolio/portfolio"><i class='bx bx-briefcase-alt'></i>Portifólio</a></li>
            <li><a href="https://leosergio.github.io/Projeto/sobremim/sobremim"><i class='bx bx-male'></i>Sobre</a></li>
        </ul>
    </header>
</div>
    <section>
        <h1>Sistema Financeiro</h1>
    </section>

    <main>
        <div class="resume">
            <div class="card card-income">
                <span>Entradas</span>
                <h2>R$ <span class="incomes">0.00</span></h2>
            </div>
            <div class="card card-expense">
                <span>Saídas</span>
                <h2>R$ <span class="expenses">0.00</span></h2>
            </div>
            <div class="card card-total">
                <span>Saldo Atual</span>
                <h2>R$ <span class="total">0.00</span></h2>
            </div>
        </div>
            
        <div class="newItem">
            <div class="input-group">
                <label for="desc">Descrição</label>
                <input type="text" id="desc" placeholder="Ex: Aluguel, Pagamento">
            </div>
            <div class="input-group">
                <label for="amount">Valor (R$)</label>
                <input type="number" id="amount" placeholder="0.00" step="0.01" min="0.01">
            </div>
            <div class="input-group">
                <label for="date">Data</label>
                <input type="date" id="date">
            </div>
            <div class="input-group">
                <label for="type">Tipo</label>
                <select id="type">
                    <option value="Entrada">Entrada</option>
                    <option value="Fixo">Saída Fixa</option>
                    <option value="Variavel">Saída Variável</option>
                </select>
            </div>
            <button id="btnNew"><i class='bx bx-plus'></i> Incluir</button>
        </div>

        <div class="divTable">
            <table>
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Descrição</th>
                        <th class="columnAmount">Valor</th>
                        <th class="columnType">Tipo</th>
                        <th class="columnAction"></th>
                    </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
        </div>
    </main>
            <button id="btnPrint" onclick="btnPrint()">Imprimir</button>
    <footer>
        
    </footer>
    <script type="module" src="js/app.js"></script>
    <script src="https://unpkg.com/boxicons@2.1.4/dist/boxicons.js"></script>
</body>
</html>
